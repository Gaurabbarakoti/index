<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gaurab Barakoti — Digital Creator | TridevCore ॐ</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=Space+Mono:wght@400;700&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,300&display=swap" rel="stylesheet">
<style>
  :root { --black: #050505; --white: #f5f0e8; --gold: #c9a84c; --muted: #6b6560; --card-bg: #0f0e0c; --border: rgba(201,168,76,0.18); }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html { scroll-behavior: smooth; cursor: none; }
  body { background: var(--black); color: var(--white); font-family: 'DM Sans', sans-serif; overflow-x: hidden; }
  
  /* CURSOR & NAV STYLES - राख्नुहोस् */
  .cursor, .cursor-ring { pointer-events: none; position: fixed; border-radius: 50%; z-index: 9999; }
  .cursor { width: 8px; height: 8px; background: var(--gold); }
  .cursor-ring { width: 30px; height: 30px; border: 1px solid var(--gold); transition: transform 0.1s ease; }
  nav { padding: 30px 50px; display: flex; justify-content: space-between; align-items: center; }
  .nav-logo { font-family: 'Syne'; font-weight: 800; color: var(--gold); letter-spacing: 2px; }
  
  /* सबै खण्डहरू */
  section { padding: 100px 50px; }
  .btn-primary { background: var(--gold); color: var(--black); padding: 15px 30px; font-weight: 700; text-transform: uppercase; text-decoration: none; display: inline-block; }
  
  @media (max-width: 900px) {
    section { padding: 60px 20px; text-align: center; }
  }
</style>
</head>
<body>

<div class="cursor" id="cursor"></div>
<div class="cursor-ring" id="cursorRing"></div>

<nav>
  <div class="nav-logo">GB ◈ TRIDEVCORE</div>
</nav>

<!-- HERO -->
<section class="hero">
  <h1>Gaurab <span style="color:var(--gold)">Barakoti</span></h1>
  <p style="margin: 20px 0; color: var(--muted); max-width: 500px;">
    Merging Sanatan philosophy, cinematic storytelling, and fearless civic commentary. Founder of <strong>TridevCore ॐ</strong>.
  </p>
  <a href="#contact" class="btn-primary">Get in Touch</a>
</section>

<!-- ABOUT -->
<section id="about">
  <h2>About</h2>
  <p>I'm Gaurab Barakoti, a content creator from Damak, Jhapa. I blend Sanatan wisdom with modern storytelling.</p>
</section>

<!-- बाँकी खण्डहरू (Platforms, Work, Contact, Footer) यहाँ पुरानो कोड अनुसार थप्नुहोस् -->

<script>
  const cursor = document.getElementById('cursor');
  const ring = document.getElementById('cursorRing');
  document.addEventListener('mousemove', e => {
    cursor.style.transform = `translate(${e.clientX - 4}px, ${e.clientY - 4}px)`;
    ring.style.transform = `translate(${e.clientX - 15}px, ${e.clientY - 15}px)`;
  });
</script>
</body>
</html>
