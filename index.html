<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Gaurab Barakoti — Digital Creator, founder of TridevCore ॐ. Focused on Sanatan philosophy, cinematic storytelling, and political commentary.">
    <title>Gaurab Barakoti — Digital Creator | TridevCore ॐ</title>
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=Space+Mono:wght@400;700&family=DM+Sans:ital,wght@0,300;0,400;1,300&display=swap" rel="stylesheet">
    <style>
        :root {
            --black: #050505;
            --white: #f5f0e8;
            --gold: #c9a84c;
            --muted: #6b6560;
            --card-bg: #0f0e0c;
            --border: rgba(201,168,76,0.18);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        html { scroll-behavior: smooth; cursor: none; }
        body { background: var(--black); color: var(--white); font-family: 'DM Sans', sans-serif; overflow-x: hidden; }

        /* Custom Cursor */
        .cursor { width: 10px; height: 10px; background: var(--gold); border-radius: 50%; position: fixed; pointer-events: none; z-index: 9999; transition: transform 0.1s ease; }
        .cursor-ring { width: 36px; height: 36px; border: 1px solid rgba(201,168,76,0.5); border-radius: 50%; position: fixed; pointer-events: none; z-index: 9998; transition: transform 0.25s ease; }

        /* Navigation */
        nav { position: fixed; top: 0; width: 100%; padding: 24px 48px; display: flex; justify-content: space-between; align-items: center; z-index: 500; background: rgba(5,5,5,0.8); backdrop-filter: blur(10px); }
        .nav-logo { font-family: 'Syne', sans-serif; font-weight: 800; color: var(--gold); letter-spacing: 0.2em; }

        /* Hero Section */
        .hero { min-height: 100vh; display: grid; grid-template-columns: 1fr 1fr; align-items: center; padding: 0 80px; }
        .btn-primary { background: var(--gold); color: var(--black); padding: 14px 32px; font-family: 'Syne', sans-serif; font-weight: 700; text-decoration: none; display: inline-block; transition: 0.3s; }
        .btn-primary:hover { background: var(--white); }

        @media (max-width: 900px) {
            .hero { grid-template-columns: 1fr; padding: 100px 24px; text-align: center; }
            .hero-right { display: none; }
        }
    </style>
</head>
<body>

    <div class="cursor" id="cursor"></div>
    <div class="cursor-ring" id="cursorRing"></div>

    <nav>
        <div class="nav-logo">GB ◈ TRIDEVCORE</div>
    </nav>

    <section class="hero">
        <div class="hero-left">
            <h1 style="font-family: 'Syne'; font-size: clamp(48px, 6vw, 84px); line-height: 0.95;">Gaurab <span style="color: var(--gold);">Barakoti</span></h1>
            <p style="color: var(--muted); margin: 30px 0; max-width: 450px; line-height: 1.7;">
                Merging <strong>Sanatan philosophy</strong>, cinematic storytelling, and fearless civic commentary. Founder of <strong>TridevCore ॐ</strong>.
            </p>
            <a href="#contact" class="btn-primary">Get in Touch</a>
        </div>
    </section>

    <script>
        const cursor = document.getElementById('cursor');
        const ring = document.getElementById('cursorRing');
        document.addEventListener('mousemove', e => {
            cursor.style.transform = `translate(${e.clientX - 5}px, ${e.clientY - 5}px)`;
            ring.style.transform = `translate(${e.clientX - 18}px, ${e.clientY - 18}px)`;
        });
    </script>
</body>
</html>
