<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>TridevCore Knowledge</title>

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: #0f172a;
  color: white;
}

/* NAVBAR */
header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 15px 20px;
  background: #111827;
  position: sticky;
  top: 0;
}

.logo {
  font-size: 20px;
  font-weight: bold;
}

.nav {
  display: flex;
  gap: 15px;
  list-style: none;
}

.nav a {
  color: white;
  text-decoration: none;
}

.menu {
  display: none;
  font-size: 24px;
  cursor: pointer;
}

/* HERO */
.hero {
  text-align: center;
  padding: 50px 20px;
}

/* SEARCH */
.search-box {
  text-align: center;
  margin: 20px;
}

.search-box input {
  width: 70%;
  padding: 10px;
  border-radius: 8px;
  border: none;
}

/* CARDS */
.posts {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
  gap: 20px;
  padding: 20px;
}

.card {
  background: #1f2937;
  padding: 15px;
  border-radius: 10px;
  transition: 0.3s;
}

.card:hover {
  transform: scale(1.05);
}

.card img {
  width: 100%;
  border-radius: 10px;
}

/* FOOTER */
footer {
  text-align: center;
  padding: 15px;
  background: #111827;
  margin-top: 20px;
}

/* MOBILE */
@media(max-width:768px){
  .nav {
    display: none;
    flex-direction: column;
    position: absolute;
    top: 60px;
    right: 0;
    background: #111827;
    width: 180px;
    padding: 10px;
  }

  .menu {
    display: block;
  }

  .nav.active {
    display: flex;
  }
}
</style>
</head>

<body>

<header>
  <div class="logo">TridevCore</div>

  <ul class="nav" id="nav">
    <li><a href="#">Home</a></li>
    <li><a href="#">Posts</a></li>
    <li><a href="#">About</a></li>
  </ul>

  <div class="menu" onclick="toggleMenu()">☰</div>
</header>

<section class="hero">
  <h1>Knowledge Hub</h1>
  <p>Learn & Grow Everyday 🚀</p>
</section>

<div class="search-box">
  <input type="text" id="search" placeholder="Search posts...">
</div>

<section class="posts" id="posts">

  <div class="card">
    <img src="https://source.unsplash.com/400x300/?technology">
    <h3>Tech Knowledge</h3>
    <p>Learn modern tech basics</p>
  </div>

  <div class="card">
    <img src="https://source.unsplash.com/400x300/?coding">
    <h3>Coding Guide</h3>
    <p>Start programming easily</p>
  </div>

  <div class="card">
    <img src="https://source.unsplash.com/400x300/?education">
    <h3>Education Tips</h3>
    <p>Improve your learning</p>
  </div>

</section>

<footer>
  © 2026 TridevCore Official
</footer>

<script>
function toggleMenu(){
  document.getElementById("nav").classList.toggle("active");
}

// SEARCH FILTER
document.getElementById("search").addEventListener("keyup", function(){
  let value = this.value.toLowerCase();
  let cards = document.querySelectorAll(".card");

  cards.forEach(card => {
    let text = card.innerText.toLowerCase();
    card.style.display = text.includes(value) ? "block" : "none";
  });
});
</script>

</body>
</html>
