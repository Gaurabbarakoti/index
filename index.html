<html lang="en"><head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gaurab Barakoti | Content Creator</title>
<script src="https://cdn.tailwindcss.com"></script>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Space+Grotesk:wght@500;600;700&display=swap');
  
  * {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
  }
  
  body {
    font-family: 'Inter', sans-serif;
    background: #0a0a0a;
    color: #ffffff;
    overflow-x: hidden;
    min-height: 100vh;
  }
  
  .gradient-bg {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    z-index: -1;
    background: radial-gradient(circle at 20% 50%, rgba(120, 53, 255, 0.18) 0%, transparent 50%),
                radial-gradient(circle at 80% 80%, rgba(168, 85, 247, 0.15) 0%, transparent 50%),
                radial-gradient(circle at 50% 20%, rgba(99, 102, 241, 0.12) 0%, transparent 50%);
    animation: gradientShift 15s ease infinite;
  }
  
  @keyframes gradientShift {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.8; }
  }
  
  .logo-wrapper {
    position: relative;
    display: inline-block;
  }
  
  .logo-wrapper::before {
    content: '';
    position: absolute;
    inset: -12px;
    background: linear-gradient(135deg, #a855f7, #6366f1, #8b5cf6);
    border-radius: 50%;
    z-index: -1;
    filter: blur(25px);
    opacity: 0.7;
    animation: pulse 3s ease-in-out infinite;
  }
  
  @keyframes pulse {
    0%, 100% { transform: scale(1); opacity: 0.7; }
    50% { transform: scale(1.05); opacity: 0.9; }
  }
  
  .logo-container {
    background: linear-gradient(135deg, #a855f7, #6366f1);
    padding: 5px;
    border-radius: 50%;
    display: inline-block;
    transition: transform 0.4s ease;
    box-shadow: 0 20px 60px rgba(168, 85, 247, 0.3);
  }
  
  .logo-container:hover {
    transform: scale(1.02) rotate(2deg);
  }
  
  .logo-img {
    border-radius: 50%;
    background: #000000;
    object-fit: cover;
    display: block;
  }
  
  .name-title {
    font-family: 'Space Grotesk', sans-serif;
    background: linear-gradient(135deg, #ffffff 0%, #c4b5fd 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }
  
  .job-badge {
    background: linear-gradient(135deg, rgba(168, 85, 247, 0.15), rgba(99, 102, 241, 0.15));
    border: 1px solid rgba(168, 85, 247, 0.3);
    backdrop-filter: blur(10px);
  }
  
  .location-chip {
    background: rgba(255, 255, 255, 0.05);
    border: 1px solid rgba(255, 255, 255, 0.1);
    backdrop-filter: blur(10px);
  }
  
  .social-icon {
    width: 52px;
    height: 52px;
    display: flex;
    align-items: center;
    justify-content: center;
    background: rgba(255, 255, 255, 0.05);
    border: 1px solid rgba(255, 255, 255, 0.1);
    border-radius: 14px;
    color: #ffffff;
    font-size: 22px;
    transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    backdrop-filter: blur(10px);
    position: relative;
    overflow: hidden;
  }
  
  .social-icon::before {
    content: '';
    position: absolute;
    inset: 0;
    background: linear-gradient(135deg, #a855f7, #6366f1);
    opacity: 0;
    transition: opacity 0.3s ease;
  }
  
  .social-icon:hover::before {
    opacity: 1;
  }
  
  .social-icon i {
    position: relative;
    z-index: 1;
  }
  
  .social-icon:hover {
    border-color: transparent;
    transform: translateY(-4px) scale(1.05);
    box-shadow: 0 15px 35px rgba(168, 85, 247, 0.5);
  }
  
  .btn-primary {
    background: linear-gradient(135deg, #a855f7, #6366f1);
    border: none;
    padding: 16px 36px;
    border-radius: 14px;
    font-weight: 600;
    color: white;
    transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    cursor: pointer;
    box-shadow: 0 4px 20px rgba(168, 85, 247, 0.3);
    display: inline-flex;
    align-items: center;
    gap: 10px;
    white-space: nowrap;
  }
  
  .btn-primary:hover {
    transform: translateY(-3px);
    box-shadow: 0 12px 35px rgba(168, 85, 247, 0.6);
  }
  
  .btn-secondary {
    background: rgba(255, 255, 255, 0.05);
    border: 1px solid rgba(255, 255, 255, 0.15);
    padding: 16px 36px;
    border-radius: 14px;
    font-weight: 600;
    color: white;
    backdrop-filter: blur(10px);
    transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    cursor: pointer;
    display: inline-flex;
    align-items: center;
    gap: 10px;
    white-space: nowrap;
  }
  
  .btn-secondary:hover {
    background: rgba(255, 255, 255, 0.1);
    border-color: rgba(168, 85, 247, 0.5);
    transform: translateY(-3px);
  }
  
  .fade-in {
    animation: fadeIn 0.8s ease-out forwards;
    opacity: 0;
  }
  
  @keyframes fadeIn {
    to { opacity: 1; transform: translateY(0); }
    from { opacity: 0; transform: translateY(20px); }
  }
  
  .fade-in-1 { animation-delay: 0.1s; }
  .fade-in-2 { animation-delay: 0.2s; }
  .fade-in-3 { animation-delay: 0.3s; }
  .fade-in-4 { animation-delay: 0.4s; }
  .fade-in-5 { animation-delay: 0.5s; }
  
  @media (max-width: 640px) {
    .logo-img {
      width: 200px !important;
      height: 200px !important;
    }
    .name-title {
      font-size: 2.5rem !important;
    }
    .social-icon {
      width: 48px;
      height: 48px;
      font-size: 20px;
    }
    .btn-primary, .btn-secondary {
      padding: 14px 28px;
      font-size: 15px;
    }
  }
  
  @media (max-width: 380px) {
    .logo-img {
      width: 170px !important;
      height: 170px !important;
    }
  }
</style>
