<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gaurab Barakoti | Sanatan Dharma Library</title>
<style>
    body { background-color: #050302; color: #f5ede0; font-family: sans-serif; margin: 0; padding: 20px; }
    .book-card { background: #19130e; padding: 20px; margin-bottom: 20px; border-radius: 15px; border: 1px solid #333; }
    h3 { color: #ff8c42; margin-top: 0; }
    button { background: #ff8c42; border: none; padding: 10px 20px; border-radius: 20px; cursor: pointer; font-weight: bold; }
    .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); padding: 20px; overflow-y: auto; }
    .modal-content { max-width: 600px; margin: 50px auto; background: #1a1510; padding: 25px; border-radius: 20px; }
</style>
</head>
<body>

<div id="app">
    <div style="text-align: center;">
        <h1>GAURAB ॐ BARAKOTI</h1>
        <button onclick="changeLang('en')">EN</button>
        <button onclick="changeLang('ne')">नेपाली</button>
    </div>

    <div id="bookList"></div>
</div>

<div id="modal" class="modal">
    <div class="modal-content">
        <button onclick="closeModal()">Close</button>
        <h2 id="modalTitle"></h2>
        <p id="modalBody"></p>
    </div>
</div>

<script>
const books = [
    { name: "Ṛg Veda (ऋग्वेद)", desc: "The oldest Veda", text: "ऋग्वेदको मन्त्र... (Here you put full text)" },
    { name: "Īśa Upaniṣad (ईशा उपनिषद्)", desc: "All this is enveloped by the Lord.", text: "ईशावास्यमिदं सर्वं... (Here you put full text)" }
];

let currentLang = 'en';

function renderBooks() {
    const list = document.getElementById('bookList');
    list.innerHTML = books.map((b, i) => `
        <div class="book-card">
            <h3>${b.name}</h3>
            <p>${b.desc}</p>
            <button onclick="openModal(${i})">Read Full</button>
        </div>
    `).join('');
}

function openModal(i) {
    document.getElementById('modalTitle').innerText = books[i].name;
    document.getElementById('modalBody').innerText = books[i].text;
    document.getElementById('modal').style.display = 'block';
}

function closeModal() { document.getElementById('modal').style.display = 'none'; }
function changeLang(lang) { currentLang = lang; alert('Language switched to ' + lang); }

renderBooks();
</script>

</body>
</html>
