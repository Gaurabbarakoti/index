<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TridevCore ॐ — Media Player</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{background:#04020a;color:#ede0c4;font-family:'Segoe UI',sans-serif;min-height:100vh;display:flex;flex-direction:column;align-items:center;padding:20px;}

h1{font-size:1.3rem;color:#c9a84c;letter-spacing:3px;margin-bottom:20px;text-align:center;}

.player-wrap{width:100%;max-width:860px;background:#0d0918;border:1px solid rgba(201,168,76,.2);border-radius:10px;overflow:hidden;box-shadow:0 20px 60px rgba(0,0,0,.6);}

/* VIDEO AREA */
.video-area{position:relative;background:#000;aspect-ratio:16/9;}
#videoEl{width:100%;height:100%;display:block;background:#000;}
#audioEl{display:none;}

.overlay{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;background:rgba(0,0,0,.5);transition:.3s;}
.overlay.hidden{opacity:0;pointer-events:none;}
.big-play{width:70px;height:70px;background:rgba(201,168,76,.9);border-radius:50%;border:none;cursor:pointer;font-size:1.8rem;color:#000;display:flex;align-items:center;justify-content:center;transition:.2s;}
.big-play:hover{transform:scale(1.1);background:#c9a84c;}

/* LOADING SPINNER */
.spinner{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);display:none;}
.spinner.show{display:block;}
.spinner div{width:40px;height:40px;border:3px solid rgba(201,168,76,.2);border-top-color:#c9a84c;border-radius:50%;animation:spin .8s linear infinite;}
@keyframes spin{to{transform:rotate(360deg)}}

/* CONTROLS */
.controls{padding:14px 16px 10px;background:#0d0918;}

/* PROGRESS */
.progress-wrap{position:relative;height:5px;background:rgba(255,255,255,.1);border-radius:4px;cursor:pointer;margin-bottom:12px;transition:height .15s;}
.progress-wrap:hover{height:8px;}
.progress-buf{position:absolute;inset:0;background:rgba(201,168,76,.2);border-radius:4px;width:0%;}
.progress-bar{position:absolute;inset:0;background:linear-gradient(90deg,#c9a84c,#ff9500);border-radius:4px;width:0%;}
.progress-thumb{position:absolute;top:50%;right:-6px;width:14px;height:14px;background:#c9a84c;border-radius:50%;transform:translateY(-50%);opacity:0;transition:opacity .15s;pointer-events:none;}
.progress-wrap:hover .progress-thumb{opacity:1;}

/* BOTTOM ROW */
.ctrl-row{display:flex;align-items:center;gap:10px;flex-wrap:wrap;}
.btn{background:none;border:none;color:#ede0c4;cursor:pointer;font-size:1.1rem;padding:6px;border-radius:6px;transition:.2s;display:flex;align-items:center;}
.btn:hover{background:rgba(201,168,76,.15);color:#c9a84c;}
.btn.active{color:#c9a84c;}

/* TIME */
.time{font-size:.8rem;color:rgba(237,224,196,.6);white-space:nowrap;margin:0 4px;}

/* VOLUME */
.vol-wrap{display:flex;align-items:center;gap:6px;}
.vol-slider{-webkit-appearance:none;width:70px;height:4px;background:rgba(255,255,255,.15);border-radius:4px;outline:none;cursor:pointer;}
.vol-slider::-webkit-slider-thumb{-webkit-appearance:none;width:13px;height:13px;background:#c9a84c;border-radius:50%;}

.spacer{flex:1;}

/* SPEED */
.speed-btn{font-size:.75rem;padding:4px 8px;border:1px solid rgba(201,168,76,.3);border-radius:4px;color:#c9a84c;background:none;cursor:pointer;transition:.2s;}
.speed-btn:hover{background:rgba(201,168,76,.15);}
.speed-menu{position:relative;display:inline-block;}
.speed-list{position:absolute;bottom:110%;right:0;background:#1a1225;border:1px solid rgba(201,168,76,.2);border-radius:6px;overflow:hidden;display:none;z-index:100;min-width:80px;}
.speed-list.show{display:block;}
.speed-list button{display:block;width:100%;padding:7px 14px;background:none;border:none;color:#ede0c4;font-size:.8rem;cursor:pointer;text-align:left;transition:.2s;}
.speed-list button:hover{background:rgba(201,168,76,.15);color:#c9a84c;}
.speed-list button.active{color:#c9a84c;font-weight:bold;}

/* URL INPUT */
.url-section{padding:14px 16px;border-top:1px solid rgba(201,168,76,.1);}
.url-label{font-size:.7rem;letter-spacing:2px;color:rgba(201,168,76,.6);margin-bottom:8px;text-transform:uppercase;}
.url-row{display:flex;gap:8px;}
.url-input{flex:1;background:rgba(255,255,255,.05);border:1px solid rgba(201,168,76,.2);border-radius:6px;padding:9px 12px;color:#ede0c4;font-size:.85rem;outline:none;transition:.2s;}
.url-input:focus{border-color:rgba(201,168,76,.6);}
.url-input::placeholder{color:rgba(237,224,196,.3);}
.load-btn{padding:9px 16px;background:linear-gradient(135deg,#c9a84c,#ff9500);border:none;border-radius:6px;color:#000;font-weight:700;font-size:.82rem;cursor:pointer;white-space:nowrap;transition:.2s;}
.load-btn:hover{opacity:.85;}

/* PRESETS */
.presets{margin-top:10px;display:flex;flex-wrap:wrap;gap:6px;}
.preset{padding:5px 10px;background:rgba(201,168,76,.08);border:1px solid rgba(201,168,76,.2);border-radius:4px;color:#c9a84c;font-size:.72rem;cursor:pointer;transition:.2s;}
.preset:hover{background:rgba(201,168,76,.2);}

/* PLAYLIST */
.playlist-section{padding:14px 16px;border-top:1px solid rgba(201,168,76,.1);}
.playlist-label{font-size:.7rem;letter-spacing:2px;color:rgba(201,168,76,.6);margin-bottom:8px;text-transform:uppercase;display:flex;align-items:center;justify-content:space-between;}
.playlist-add{font-size:.7rem;background:rgba(201,168,76,.1);border:1px solid rgba(201,168,76,.2);color:#c9a84c;padding:3px 8px;border-radius:4px;cursor:pointer;}
.playlist-items{max-height:150px;overflow-y:auto;}
.pl-item{display:flex;align-items:center;gap:8px;padding:7px 8px;border-radius:6px;cursor:pointer;transition:.2s;font-size:.82rem;}
.pl-item:hover{background:rgba(201,168,76,.08);}
.pl-item.active{background:rgba(201,168,76,.15);color:#c9a84c;}
.pl-idx{width:20px;text-align:center;font-size:.72rem;color:rgba(201,168,76,.5);}
.pl-title{flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.pl-del{opacity:0;font-size:.75rem;color:rgba(255,100,100,.6);transition:.2s;background:none;border:none;cursor:pointer;}
.pl-item:hover .pl-del{opacity:1;}

/* STATUS */
.status{font-size:.72rem;color:rgba(237,224,196,.4);padding:6px 16px 10px;text-align:center;}

/* FULLSCREEN FIX */
:-webkit-full-screen .player-wrap{max-width:100%;border-radius:0;}
:fullscreen video{width:100%;height:100%;}
</style>
</head>
<body>

<h1>🔱 TridevCore ॐ — Media Player</h1>

<div class="player-wrap">

  <!-- VIDEO -->
  <div class="video-area" id="videoArea">
    <video id="videoEl" preload="metadata" playsinline></video>
    <audio id="audioEl" preload="metadata"></audio>
    <div class="overlay" id="overlay">
      <button class="big-play" id="bigPlay">▶</button>
    </div>
    <div class="spinner" id="spinner"><div></div></div>
  </div>

  <!-- CONTROLS -->
  <div class="controls">
    <!-- PROGRESS -->
    <div class="progress-wrap" id="progressWrap">
      <div class="progress-buf" id="progressBuf"></div>
      <div class="progress-bar" id="progressBar"></div>
      <div class="progress-thumb" id="progressThumb"></div>
    </div>

    <!-- BOTTOM -->
    <div class="ctrl-row">
      <button class="btn" id="prevBtn" title="Previous">⏮</button>
      <button class="btn" id="playBtn" title="Play/Pause">▶</button>
      <button class="btn" id="nextBtn" title="Next">⏭</button>

      <span class="time" id="timeDisplay">0:00 / 0:00</span>

      <div class="vol-wrap">
        <button class="btn" id="muteBtn" title="Mute">🔊</button>
        <input type="range" class="vol-slider" id="volSlider" min="0" max="1" step="0.02" value="1">
      </div>

      <div class="spacer"></div>

      <div class="speed-menu">
        <button class="speed-btn" id="speedBtn">1×</button>
        <div class="speed-list" id="speedList">
          <button data-speed="0.5">0.5×</button>
          <button data-speed="0.75">0.75×</button>
          <button data-speed="1" class="active">1×</button>
          <button data-speed="1.25">1.25×</button>
          <button data-speed="1.5">1.5×</button>
          <button data-speed="2">2×</button>
        </div>
      </div>

      <button class="btn" id="loopBtn" title="Loop">🔁</button>
      <button class="btn" id="fsBtn" title="Fullscreen">⛶</button>
    </div>
  </div>

  <!-- URL INPUT -->
  <div class="url-section">
    <div class="url-label">🌐 Stream URL / Direct Link</div>
    <div class="url-row">
      <input type="text" class="url-input" id="urlInput" placeholder="https://example.com/stream.m3u8 or .mp4 .mp3 .webm">
      <button class="load-btn" id="loadBtn">▶ Load</button>
    </div>
    <div class="presets">
      <span class="preset" data-url="https://test-streams.mux.dev/x36xhzz/x36xhzz.m3u8" data-title="Mux Test HLS Stream">📡 HLS Test</span>
      <span class="preset" data-url="https://commondatastorage.googleapis.com/gtv-videos-bucket/sample/BigBuckBunny.mp4" data-title="Big Buck Bunny (MP4)">🐰 MP4 Test</span>
      <span class="preset" data-url="https://www.w3schools.com/html/mov_bbb.mp4" data-title="W3Schools Sample">🎬 Sample</span>
    </div>
  </div>

  <!-- PLAYLIST -->
  <div class="playlist-section">
    <div class="playlist-label">
      <span>📋 Playlist</span>
      <button class="playlist-add" id="addToPlaylist">+ Add Current</button>
    </div>
    <div class="playlist-items" id="playlistItems"></div>
  </div>

  <div class="status" id="status">Ready — Paste a stream URL above and click Load</div>

</div>

<!-- HLS.js for m3u8 streams -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/hls.js/1.4.12/hls.min.js"></script>

<script>
const videoEl = document.getElementById('videoEl');
const audioEl = document.getElementById('audioEl');
const overlay = document.getElementById('overlay');
const bigPlay = document.getElementById('bigPlay');
const playBtn = document.getElementById('playBtn');
const prevBtn = document.getElementById('prevBtn');
const nextBtn = document.getElementById('nextBtn');
const muteBtn = document.getElementById('muteBtn');
const volSlider = document.getElementById('volSlider');
const loopBtn = document.getElementById('loopBtn');
const fsBtn = document.getElementById('fsBtn');
const progressWrap = document.getElementById('progressWrap');
const progressBar = document.getElementById('progressBar');
const progressBuf = document.getElementById('progressBuf');
const progressThumb = document.getElementById('progressThumb');
const timeDisplay = document.getElementById('timeDisplay');
const urlInput = document.getElementById('urlInput');
const loadBtn = document.getElementById('loadBtn');
const speedBtn = document.getElementById('speedBtn');
const speedList = document.getElementById('speedList');
const spinner = document.getElementById('spinner');
const status = document.getElementById('status');
const playlistItems = document.getElementById('playlistItems');
const addToPlaylistBtn = document.getElementById('addToPlaylist');

let hls = null;
let currentMedia = null; // 'video' or 'audio'
let playlist = [];
let currentIndex = -1;
let looping = false;
let isDragging = false;

// ===== FORMAT TIME =====
function fmt(s){
  if(isNaN(s)||!isFinite(s)) return '0:00';
  const m=Math.floor(s/60), sec=Math.floor(s%60);
  return `${m}:${sec.toString().padStart(2,'0')}`;
}

// ===== ACTIVE ELEMENT =====
function getEl(){ return currentMedia==='audio' ? audioEl : videoEl; }

// ===== LOAD URL =====
function loadURL(url, title, autoplay=true){
  if(!url) return;

  const isAudio = /\.(mp3|aac|ogg|flac|wav|m4a)(\?|$)/i.test(url);
  const isHLS = /\.m3u8(\?|$)/i.test(url) || url.includes('m3u8');

  // Reset
  if(hls){ hls.destroy(); hls=null; }
  videoEl.src=''; audioEl.src='';
  videoEl.load(); audioEl.load();

  currentMedia = isAudio ? 'audio' : 'video';
  document.getElementById('videoArea').style.display = isAudio ? 'none' : '';

  const el = getEl();

  if(isHLS && Hls.isSupported()){
    hls = new Hls({ enableWorker:true, lowLatencyMode:true });
    hls.loadSource(url);
    hls.attachMedia(videoEl);
    hls.on(Hls.Events.MANIFEST_PARSED, ()=>{
      setStatus('HLS stream loaded ✓ ' + (title||''));
      if(autoplay) el.play().catch(()=>{});
    });
    hls.on(Hls.Events.ERROR, (e,d)=>{
      if(d.fatal) setStatus('⚠️ HLS Error: ' + d.details);
    });
  } else if(isHLS && videoEl.canPlayType('application/vnd.apple.mpegurl')){
    // Safari native HLS
    videoEl.src = url;
    if(autoplay) videoEl.play().catch(()=>{});
    setStatus('HLS (native) loaded ✓ ' + (title||''));
  } else {
    el.src = url;
    el.load();
    if(autoplay) el.play().catch(()=>{});
    setStatus('Loaded: ' + (title || url.split('/').pop()));
  }

  currentMedia = isAudio ? 'audio' : 'video';
  overlay.classList.add('hidden');
}

// ===== STATUS =====
function setStatus(msg){ status.textContent = msg; }

// ===== PLAY/PAUSE =====
function togglePlay(){
  const el = getEl();
  if(el.paused || el.ended){
    el.play().catch(e=>setStatus('Cannot play: ' + e.message));
  } else {
    el.pause();
  }
}

function updatePlayBtn(){
  const el = getEl();
  const paused = el.paused || el.ended;
  playBtn.textContent = paused ? '▶' : '⏸';
  bigPlay.textContent = paused ? '▶' : '⏸';
  overlay.classList.toggle('hidden', !paused || el.currentTime > 0);
}

// ===== PROGRESS =====
function updateProgress(){
  const el = getEl();
  if(!el.duration || isDragging) return;
  const pct = (el.currentTime / el.duration) * 100;
  progressBar.style.width = pct + '%';
  progressThumb.style.left = pct + '%';
  progressThumb.style.right = 'auto';
  timeDisplay.textContent = fmt(el.currentTime) + ' / ' + fmt(el.duration);

  // Buffer
  if(el.buffered.length > 0){
    const bufPct = (el.buffered.end(el.buffered.length-1) / el.duration) * 100;
    progressBuf.style.width = bufPct + '%';
  }
}

function seekTo(e){
  const el = getEl();
  if(!el.duration) return;
  const rect = progressWrap.getBoundingClientRect();
  const pct = Math.max(0, Math.min(1, (e.clientX - rect.left) / rect.width));
  el.currentTime = pct * el.duration;
  progressBar.style.width = (pct*100) + '%';
  progressThumb.style.left = (pct*100) + '%';
}

progressWrap.addEventListener('mousedown', e=>{ isDragging=true; seekTo(e); });
progressWrap.addEventListener('touchstart', e=>{
  isDragging=true;
  seekTo(e.touches[0]);
},{passive:true});
document.addEventListener('mousemove', e=>{ if(isDragging) seekTo(e); });
document.addEventListener('mouseup', ()=>{ isDragging=false; });
document.addEventListener('touchend', ()=>{ isDragging=false; });

// ===== VOLUME =====
function updateVolBtn(){
  const el = getEl();
  muteBtn.textContent = el.muted || el.volume===0 ? '🔇' : el.volume < 0.5 ? '🔉' : '🔊';
}
muteBtn.addEventListener('click', ()=>{
  const el = getEl();
  el.muted = !el.muted;
  updateVolBtn();
});
volSlider.addEventListener('input', ()=>{
  const el = getEl();
  el.volume = parseFloat(volSlider.value);
  el.muted = el.volume === 0;
  updateVolBtn();
});

// ===== LOOP =====
loopBtn.addEventListener('click', ()=>{
  looping = !looping;
  getEl().loop = looping;
  loopBtn.classList.toggle('active', looping);
  setStatus(looping ? '🔁 Loop ON' : 'Loop OFF');
});

// ===== SPEED =====
speedBtn.addEventListener('click', e=>{ speedList.classList.toggle('show'); e.stopPropagation(); });
document.addEventListener('click', ()=> speedList.classList.remove('show'));
speedList.querySelectorAll('button').forEach(b=>{
  b.addEventListener('click', ()=>{
    const s = parseFloat(b.dataset.speed);
    getEl().playbackRate = s;
    speedBtn.textContent = s + '×';
    speedList.querySelectorAll('button').forEach(x=>x.classList.remove('active'));
    b.classList.add('active');
    speedList.classList.remove('show');
  });
});

// ===== FULLSCREEN =====
fsBtn.addEventListener('click', ()=>{
  const area = document.getElementById('videoArea');
  if(!document.fullscreenElement){
    (area.requestFullscreen||area.webkitRequestFullscreen).call(area);
  } else {
    (document.exitFullscreen||document.webkitExitFullscreen).call(document);
  }
});

// ===== EVENTS =====
[videoEl, audioEl].forEach(el=>{
  el.addEventListener('play', ()=>{ updatePlayBtn(); overlay.classList.add('hidden'); });
  el.addEventListener('pause', updatePlayBtn);
  el.addEventListener('ended', ()=>{
    updatePlayBtn();
    if(!looping && currentIndex < playlist.length-1) playNext();
  });
  el.addEventListener('timeupdate', updateProgress);
  el.addEventListener('waiting', ()=>{ spinner.classList.add('show'); });
  el.addEventListener('canplay', ()=>{ spinner.classList.remove('show'); });
  el.addEventListener('error', ()=>{
    spinner.classList.remove('show');
    setStatus('⚠️ Error loading media. Check URL / CORS policy.');
  });
  el.addEventListener('loadstart', ()=>{ spinner.classList.add('show'); });
  el.addEventListener('loadeddata', ()=>{ spinner.classList.remove('show'); updateProgress(); });
});

bigPlay.addEventListener('click', togglePlay);
playBtn.addEventListener('click', togglePlay);

// ===== LOAD BUTTON =====
loadBtn.addEventListener('click', ()=>{
  const url = urlInput.value.trim();
  if(url) loadURL(url, '', true);
  else setStatus('⚠️ Please enter a URL');
});
urlInput.addEventListener('keydown', e=>{ if(e.key==='Enter') loadBtn.click(); });

// ===== PRESETS =====
document.querySelectorAll('.preset').forEach(p=>{
  p.addEventListener('click', ()=>{
    const url = p.dataset.url;
    const title = p.dataset.title;
    urlInput.value = url;
    loadURL(url, title, true);
  });
});

// ===== PLAYLIST =====
function renderPlaylist(){
  playlistItems.innerHTML='';
  playlist.forEach((item,i)=>{
    const div=document.createElement('div');
    div.className='pl-item'+(i===currentIndex?' active':'');
    div.innerHTML=`<span class="pl-idx">${i+1}</span><span class="pl-title">${item.title||item.url.split('/').pop()}</span><button class="pl-del" data-i="${i}">✕</button>`;
    div.addEventListener('click', ()=>playAt(i));
    div.querySelector('.pl-del').addEventListener('click', e=>{ e.stopPropagation(); playlist.splice(i,1); if(currentIndex>=i) currentIndex--; renderPlaylist(); });
    playlistItems.appendChild(div);
  });
}

function playAt(i){
  currentIndex=i;
  const item=playlist[i];
  urlInput.value=item.url;
  loadURL(item.url, item.title, true);
  renderPlaylist();
}
function playNext(){ if(currentIndex<playlist.length-1) playAt(currentIndex+1); }
function playPrev(){ if(currentIndex>0) playAt(currentIndex-1); }

prevBtn.addEventListener('click', playPrev);
nextBtn.addEventListener('click', playNext);

addToPlaylistBtn.addEventListener('click', ()=>{
  const url = urlInput.value.trim();
  if(!url){ setStatus('⚠️ Load a URL first'); return; }
  const title = prompt('Title for this item:', url.split('/').pop().replace(/\?.*/,'')) || url.split('/').pop();
  playlist.push({url, title});
  currentIndex = playlist.length-1;
  renderPlaylist();
  setStatus('Added to playlist: ' + title);
});

// ===== KEYBOARD =====
document.addEventListener('keydown', e=>{
  if(['INPUT','TEXTAREA'].includes(e.target.tagName)) return;
  const el=getEl();
  if(e.code==='Space'){ e.preventDefault(); togglePlay(); }
  if(e.code==='ArrowRight') el.currentTime+=5;
  if(e.code==='ArrowLeft') el.currentTime-=5;
  if(e.code==='ArrowUp'){ e.preventDefault(); el.volume=Math.min(1,el.volume+.1); volSlider.value=el.volume; updateVolBtn(); }
  if(e.code==='ArrowDown'){ e.preventDefault(); el.volume=Math.max(0,el.volume-.1); volSlider.value=el.volume; updateVolBtn(); }
  if(e.code==='KeyM'){ el.muted=!el.muted; updateVolBtn(); }
  if(e.code==='KeyF') fsBtn.click();
});

// Init
renderPlaylist();
</script>
</body>
</html>
