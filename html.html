<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TridevCore ॐ — Stream Player</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{background:#04020a;color:#ede0c4;font-family:'Segoe UI',sans-serif;min-height:100vh;display:flex;flex-direction:column;align-items:center;padding:16px;}
h1{font-size:1.2rem;color:#c9a84c;letter-spacing:3px;margin-bottom:16px;text-align:center;}

.player-wrap{width:100%;max-width:880px;background:#0d0918;border:1px solid rgba(201,168,76,.2);border-radius:12px;overflow:hidden;box-shadow:0 20px 60px rgba(0,0,0,.7);}

.video-area{position:relative;background:#000;aspect-ratio:16/9;}
#videoEl{width:100%;height:100%;display:block;}

.overlay{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;background:rgba(0,0,0,.45);transition:.3s;cursor:pointer;}
.overlay.hidden{opacity:0;pointer-events:none;}
.big-play{width:72px;height:72px;background:rgba(201,168,76,.9);border-radius:50%;border:none;font-size:1.9rem;color:#000;display:flex;align-items:center;justify-content:center;pointer-events:none;}

.spinner{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);display:none;}
.spinner.show{display:flex;}
.spin-inner{width:44px;height:44px;border:3px solid rgba(201,168,76,.2);border-top-color:#c9a84c;border-radius:50%;animation:spin .8s linear infinite;}
@keyframes spin{to{transform:rotate(360deg)}}

.controls{padding:12px 14px 10px;background:#0d0918;}
.progress-wrap{position:relative;height:5px;background:rgba(255,255,255,.1);border-radius:4px;cursor:pointer;margin-bottom:10px;transition:height .15s;}
.progress-wrap:hover{height:8px;}
.progress-buf{position:absolute;inset:0;background:rgba(201,168,76,.2);border-radius:4px;width:0;}
.progress-bar{position:absolute;inset:0;background:linear-gradient(90deg,#c9a84c,#ff9500);border-radius:4px;width:0;}
.progress-dot{position:absolute;top:50%;width:13px;height:13px;background:#c9a84c;border-radius:50%;transform:translate(-50%,-50%);opacity:0;transition:opacity .15s;left:0;}
.progress-wrap:hover .progress-dot{opacity:1;}

.ctrl-row{display:flex;align-items:center;gap:8px;flex-wrap:wrap;}
.btn{background:none;border:none;color:#ede0c4;cursor:pointer;font-size:1.05rem;padding:6px 8px;border-radius:6px;transition:.2s;display:flex;align-items:center;justify-content:center;}
.btn:hover{background:rgba(201,168,76,.15);color:#c9a84c;}
.btn.on{color:#c9a84c;}
.time{font-size:.78rem;color:rgba(237,224,196,.55);white-space:nowrap;}
.spacer{flex:1;}
.vol-wrap{display:flex;align-items:center;gap:5px;}
.vol-slider{-webkit-appearance:none;width:65px;height:4px;background:rgba(255,255,255,.15);border-radius:4px;outline:none;cursor:pointer;}
.vol-slider::-webkit-slider-thumb{-webkit-appearance:none;width:12px;height:12px;background:#c9a84c;border-radius:50%;}
.speed-wrap{position:relative;}
.speed-btn{font-size:.72rem;padding:4px 8px;border:1px solid rgba(201,168,76,.3);border-radius:4px;color:#c9a84c;background:none;cursor:pointer;}
.speed-menu{position:absolute;bottom:115%;right:0;background:#1a1225;border:1px solid rgba(201,168,76,.25);border-radius:8px;overflow:hidden;display:none;z-index:50;min-width:75px;}
.speed-menu.open{display:block;}
.speed-menu button{display:block;width:100%;padding:7px 14px;background:none;border:none;color:#ede0c4;font-size:.78rem;cursor:pointer;text-align:left;}
.speed-menu button:hover,.speed-menu button.on{background:rgba(201,168,76,.15);color:#c9a84c;}

.url-section{padding:12px 14px;border-top:1px solid rgba(201,168,76,.1);}
.label{font-size:.65rem;letter-spacing:2px;color:rgba(201,168,76,.55);margin-bottom:8px;text-transform:uppercase;}
.url-row{display:flex;gap:8px;margin-bottom:8px;}
.url-input{flex:1;background:rgba(255,255,255,.04);border:1px solid rgba(201,168,76,.2);border-radius:6px;padding:8px 12px;color:#ede0c4;font-size:.83rem;outline:none;}
.url-input:focus{border-color:rgba(201,168,76,.55);}
.url-input::placeholder{color:rgba(237,224,196,.25);}
.load-btn{padding:8px 14px;background:linear-gradient(135deg,#c9a84c,#ff9500);border:none;border-radius:6px;color:#000;font-weight:700;font-size:.8rem;cursor:pointer;white-space:nowrap;}
.load-btn:hover{opacity:.85;}

.options-row{display:flex;align-items:center;gap:10px;flex-wrap:wrap;margin-bottom:8px;}
.toggle-wrap{display:flex;align-items:center;gap:6px;font-size:.75rem;color:rgba(237,224,196,.6);cursor:pointer;}
.toggle{width:32px;height:18px;background:rgba(255,255,255,.1);border-radius:10px;position:relative;transition:.3s;cursor:pointer;border:none;}
.toggle.on{background:rgba(201,168,76,.7);}
.toggle::after{content:'';position:absolute;top:2px;left:2px;width:14px;height:14px;background:#fff;border-radius:50%;transition:.3s;}
.toggle.on::after{left:16px;}

.presets{display:flex;flex-wrap:wrap;gap:6px;}
.preset{padding:5px 10px;background:rgba(201,168,76,.07);border:1px solid rgba(201,168,76,.18);border-radius:4px;color:#c9a84c;font-size:.7rem;cursor:pointer;transition:.2s;}
.preset:hover{background:rgba(201,168,76,.18);}

.pl-section{padding:12px 14px;border-top:1px solid rgba(201,168,76,.1);}
.pl-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px;}
.pl-add{font-size:.68rem;background:rgba(201,168,76,.1);border:1px solid rgba(201,168,76,.2);color:#c9a84c;padding:3px 8px;border-radius:4px;cursor:pointer;}
.pl-list{max-height:140px;overflow-y:auto;}
.pl-item{display:flex;align-items:center;gap:8px;padding:6px 8px;border-radius:6px;cursor:pointer;font-size:.8rem;transition:.2s;}
.pl-item:hover{background:rgba(201,168,76,.07);}
.pl-item.on{background:rgba(201,168,76,.14);color:#c9a84c;}
.pl-num{width:18px;font-size:.68rem;color:rgba(201,168,76,.4);text-align:center;}
.pl-name{flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.pl-rm{opacity:0;color:rgba(255,100,100,.5);background:none;border:none;cursor:pointer;font-size:.72rem;}
.pl-item:hover .pl-rm{opacity:1;}

.status{font-size:.7rem;color:rgba(237,224,196,.35);padding:6px 14px 10px;text-align:center;min-height:28px;}

.err{color:rgba(255,100,100,.7);}
.ok{color:rgba(100,255,150,.7);}
</style>
</head>
<body>
<h1>🔱 TridevCore ॐ — Network Stream Player</h1>

<div class="player-wrap">

  <div class="video-area" id="vArea">
    <video id="videoEl" preload="metadata" playsinline crossorigin="anonymous"></video>
    <div class="overlay" id="overlay"><div class="big-play" id="bigPlay">▶</div></div>
    <div class="spinner" id="spinner"><div class="spin-inner"></div></div>
  </div>

  <div class="controls">
    <div class="progress-wrap" id="pw">
      <div class="progress-buf" id="pbuf"></div>
      <div class="progress-bar" id="pbar"></div>
      <div class="progress-dot" id="pdot"></div>
    </div>
    <div class="ctrl-row">
      <button class="btn" id="prevBtn">⏮</button>
      <button class="btn" id="playBtn">▶</button>
      <button class="btn" id="nextBtn">⏭</button>
      <span class="time" id="timeEl">0:00 / 0:00</span>
      <div class="vol-wrap">
        <button class="btn" id="muteBtn">🔊</button>
        <input type="range" class="vol-slider" id="volEl" min="0" max="1" step="0.02" value="1">
      </div>
      <div class="spacer"></div>
      <div class="speed-wrap">
        <button class="speed-btn" id="speedBtn">1×</button>
        <div class="speed-menu" id="speedMenu">
          <button data-s="0.25">0.25×</button>
          <button data-s="0.5">0.5×</button>
          <button data-s="0.75">0.75×</button>
          <button data-s="1" class="on">1×</button>
          <button data-s="1.25">1.25×</button>
          <button data-s="1.5">1.5×</button>
          <button data-s="2">2×</button>
        </div>
      </div>
      <button class="btn" id="loopBtn" title="Loop">🔁</button>
      <button class="btn" id="pipBtn" title="Picture in Picture">⧉</button>
      <button class="btn" id="fsBtn" title="Fullscreen">⛶</button>
    </div>
  </div>

  <div class="url-section">
    <div class="label">🌐 Stream URL</div>
    <div class="url-row">
      <input type="text" class="url-input" id="urlIn" placeholder="https://... .m3u8 / .mp4 / .mp3 / .webm">
      <button class="load-btn" id="loadBtn">▶ Play</button>
    </div>
    <div class="options-row">
      <label class="toggle-wrap">
        <button class="toggle" id="proxyToggle"></button>
        <span>CORS Proxy (blocked streams fix)</span>
      </label>
      <label class="toggle-wrap">
        <button class="toggle on" id="hlsToggle"></button>
        <span>HLS.js engine</span>
      </label>
    </div>
    <div class="label">Quick Test Streams</div>
    <div class="presets">
      <span class="preset" data-u="https://test-streams.mux.dev/x36xhzz/x36xhzz.m3u8" data-t="Mux HLS Test">📡 HLS Live Test</span>
      <span class="preset" data-u="https://commondatastorage.googleapis.com/gtv-videos-bucket/sample/BigBuckBunny.mp4" data-t="Big Buck Bunny">🐰 MP4 Sample</span>
      <span class="preset" data-u="https://commondatastorage.googleapis.com/gtv-videos-bucket/sample/ElephantsDream.mp4" data-t="Elephants Dream">🐘 MP4 Sample 2</span>
      <span class="preset" data-u="https://ncdn.telewebion.ir/faratar/live/playlist.m3u8" data-t="Faratar TV (IR)">📺 Faratar TV</span>
      <span class="preset" data-u="https://live.muslimsTV.net:8181/live/stream.m3u8" data-t="Muslims TV">📡 Muslims TV</span>
    </div>
  </div>

  <div class="pl-section">
    <div class="pl-header">
      <div class="label" style="margin:0">📋 Playlist</div>
      <button class="pl-add" id="plAdd">+ Add URL</button>
    </div>
    <div class="pl-list" id="plList"></div>
  </div>

  <div class="status" id="statusEl">Ready — Enter URL above and click Play</div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/hls.js/1.4.12/hls.min.js"></script>
<script>
const V = document.getElementById('videoEl');
const overlay = document.getElementById('overlay');
const bigPlay = document.getElementById('bigPlay');
const playBtn = document.getElementById('playBtn');
const prevBtn = document.getElementById('prevBtn');
const nextBtn = document.getElementById('nextBtn');
const muteBtn = document.getElementById('muteBtn');
const volEl = document.getElementById('volEl');
const loopBtn = document.getElementById('loopBtn');
const pipBtn = document.getElementById('pipBtn');
const fsBtn = document.getElementById('fsBtn');
const pw = document.getElementById('pw');
const pbar = document.getElementById('pbar');
const pbuf = document.getElementById('pbuf');
const pdot = document.getElementById('pdot');
const timeEl = document.getElementById('timeEl');
const urlIn = document.getElementById('urlIn');
const loadBtn = document.getElementById('loadBtn');
const speedBtn = document.getElementById('speedBtn');
const speedMenu = document.getElementById('speedMenu');
const spinner = document.getElementById('spinner');
const statusEl = document.getElementById('statusEl');
const plList = document.getElementById('plList');
const plAdd = document.getElementById('plAdd');
const proxyToggle = document.getElementById('proxyToggle');
const hlsToggle = document.getElementById('hlsToggle');

// CORS proxies to try in order
const PROXIES = [
  'https://corsproxy.io/?',
  'https://api.allorigins.win/raw?url=',
  'https://cors.sh/',
];

let hls = null;
let playlist = [];
let plIdx = -1;
let looping = false;
let useProxy = false;
let useHLS = true;
let dragging = false;

const fmt = s => isNaN(s)||!isFinite(s) ? '0:00' : `${Math.floor(s/60)}:${String(Math.floor(s%60)).padStart(2,'0')}`;
const setStatus = (msg, cls='') => { statusEl.textContent=msg; statusEl.className='status '+(cls||''); };

// ===== TOGGLE BUTTONS =====
proxyToggle.addEventListener('click', ()=>{
  useProxy = !useProxy;
  proxyToggle.classList.toggle('on', useProxy);
});
hlsToggle.addEventListener('click', ()=>{
  useHLS = !useHLS;
  hlsToggle.classList.toggle('on', useHLS);
});

// ===== LOAD STREAM =====
function buildURL(raw){
  if(useProxy){
    return PROXIES[0] + encodeURIComponent(raw);
  }
  return raw;
}

function loadStream(rawURL, title='', auto=true){
  if(!rawURL.trim()){ setStatus('⚠️ Enter a URL first','err'); return; }

  const url = buildURL(rawURL.trim());
  const isHLS = /\.m3u8/i.test(rawURL) || rawURL.includes('m3u8');

  setStatus('⏳ Loading: ' + (title||rawURL.split('/').pop().substring(0,50)));
  spinner.classList.add('show');

  // Destroy old HLS instance
  if(hls){ hls.destroy(); hls=null; }
  V.src='';

  if(isHLS && useHLS && Hls.isSupported()){
    hls = new Hls({
      enableWorker: true,
      lowLatencyMode: true,
      xhrSetup: function(xhr, url){
        // If proxy mode, modify segment URLs too
        if(useProxy && !url.startsWith(PROXIES[0])){
          // HLS.js will call this for each segment
        }
      }
    });
    hls.loadSource(url);
    hls.attachMedia(V);
    hls.on(Hls.Events.MANIFEST_PARSED, ()=>{
      setStatus('✓ Stream loaded — ' + (title||'HLS'), 'ok');
      if(auto) V.play().catch(()=>{});
    });
    hls.on(Hls.Events.ERROR, (e, d)=>{
      if(d.fatal){
        setStatus('⚠️ HLS Error: ' + d.details + ' — Try enabling CORS Proxy', 'err');
        spinner.classList.remove('show');
      }
    });
  } else if(isHLS && V.canPlayType('application/vnd.apple.mpegurl')){
    // Safari native HLS
    V.src = rawURL;
    V.load();
    if(auto) V.play().catch(()=>{});
    setStatus('✓ HLS native (Safari)', 'ok');
  } else {
    // Direct video/audio
    V.src = url;
    V.load();
    if(auto) V.play().catch(e=>{
      setStatus('⚠️ Cannot play — Try CORS Proxy toggle or check URL', 'err');
    });
  }
}

loadBtn.addEventListener('click', ()=>{ loadStream(urlIn.value, '', true); });
urlIn.addEventListener('keydown', e=>{ if(e.key==='Enter') loadBtn.click(); });

// ===== PRESETS =====
document.querySelectorAll('.preset').forEach(p=>{
  p.addEventListener('click', ()=>{
    urlIn.value = p.dataset.u;
    loadStream(p.dataset.u, p.dataset.t, true);
  });
});

// ===== PLAY/PAUSE =====
function togglePlay(){
  if(V.paused||V.ended) V.play().catch(()=>{});
  else V.pause();
}
function updatePlayUI(){
  const p = V.paused||V.ended;
  playBtn.textContent = p ? '▶' : '⏸';
  bigPlay.textContent = p ? '▶' : '⏸';
  overlay.classList.toggle('hidden', !p || V.currentTime>0);
}

overlay.addEventListener('click', togglePlay);
playBtn.addEventListener('click', togglePlay);

// ===== PROGRESS =====
function updateProgress(){
  if(!V.duration||dragging) return;
  const pct = (V.currentTime/V.duration)*100;
  pbar.style.width = pct+'%';
  pdot.style.left = pct+'%';
  timeEl.textContent = fmt(V.currentTime)+' / '+fmt(V.duration);
  if(V.buffered.length){
    pbuf.style.width = (V.buffered.end(V.buffered.length-1)/V.duration*100)+'%';
  }
}

function seekFromEvent(e){
  if(!V.duration) return;
  const r = pw.getBoundingClientRect();
  const x = e.touches ? e.touches[0].clientX : e.clientX;
  const pct = Math.max(0,Math.min(1,(x-r.left)/r.width));
  V.currentTime = pct*V.duration;
  pbar.style.width = (pct*100)+'%';
  pdot.style.left = (pct*100)+'%';
}

pw.addEventListener('mousedown', e=>{ dragging=true; seekFromEvent(e); });
pw.addEventListener('touchstart', e=>{ dragging=true; seekFromEvent(e); },{passive:true});
document.addEventListener('mousemove', e=>{ if(dragging) seekFromEvent(e); });
document.addEventListener('touchmove', e=>{ if(dragging) seekFromEvent(e.touches[0]); },{passive:true});
document.addEventListener('mouseup', ()=>{ dragging=false; });
document.addEventListener('touchend', ()=>{ dragging=false; });

// ===== VOLUME =====
function updateVolUI(){
  muteBtn.textContent = V.muted||V.volume===0 ? '🔇' : V.volume<0.5 ? '🔉' : '🔊';
}
muteBtn.addEventListener('click', ()=>{ V.muted=!V.muted; updateVolUI(); });
volEl.addEventListener('input', ()=>{ V.volume=parseFloat(volEl.value); V.muted=V.volume===0; updateVolUI(); });

// ===== SPEED =====
speedBtn.addEventListener('click', e=>{ speedMenu.classList.toggle('open'); e.stopPropagation(); });
document.addEventListener('click', ()=>speedMenu.classList.remove('open'));
speedMenu.querySelectorAll('button').forEach(b=>{
  b.addEventListener('click', ()=>{
    const s=parseFloat(b.dataset.s);
    V.playbackRate=s;
    speedBtn.textContent=s+'×';
    speedMenu.querySelectorAll('button').forEach(x=>x.classList.remove('on'));
    b.classList.add('on');
    speedMenu.classList.remove('open');
  });
});

// ===== LOOP =====
loopBtn.addEventListener('click', ()=>{ looping=!looping; V.loop=looping; loopBtn.classList.toggle('on',looping); });

// ===== PIP =====
pipBtn.addEventListener('click', ()=>{
  if(document.pictureInPictureElement) document.exitPictureInPicture();
  else if(V.requestPictureInPicture) V.requestPictureInPicture().catch(()=>{});
});

// ===== FULLSCREEN =====
fsBtn.addEventListener('click', ()=>{
  const a=document.getElementById('vArea');
  if(!document.fullscreenElement)(a.requestFullscreen||a.webkitRequestFullscreen).call(a);
  else(document.exitFullscreen||document.webkitExitFullscreen).call(document);
});

// ===== VIDEO EVENTS =====
V.addEventListener('play', updatePlayUI);
V.addEventListener('pause', updatePlayUI);
V.addEventListener('ended', ()=>{
  updatePlayUI();
  if(!looping && plIdx < playlist.length-1) playAt(plIdx+1);
});
V.addEventListener('timeupdate', updateProgress);
V.addEventListener('waiting', ()=>spinner.classList.add('show'));
V.addEventListener('canplay', ()=>spinner.classList.remove('show'));
V.addEventListener('loadeddata', ()=>{ spinner.classList.remove('show'); updateProgress(); });
V.addEventListener('error', ()=>{
  spinner.classList.remove('show');
  if(V.error) setStatus('⚠️ Error: '+V.error.message+' — Enable CORS Proxy and retry','err');
});

// ===== PLAYLIST =====
function renderPlaylist(){
  plList.innerHTML='';
  playlist.forEach((item,i)=>{
    const d=document.createElement('div');
    d.className='pl-item'+(i===plIdx?' on':'');
    d.innerHTML=`<span class="pl-num">${i+1}</span><span class="pl-name">${item.t||item.u}</span><button class="pl-rm">✕</button>`;
    d.addEventListener('click', ()=>playAt(i));
    d.querySelector('.pl-rm').addEventListener('click', e=>{
      e.stopPropagation();
      playlist.splice(i,1);
      if(plIdx>=i) plIdx--;
      renderPlaylist();
    });
    plList.appendChild(d);
  });
}
function playAt(i){
  plIdx=i;
  const item=playlist[i];
  urlIn.value=item.u;
  loadStream(item.u, item.t, true);
  renderPlaylist();
}
prevBtn.addEventListener('click', ()=>{ if(plIdx>0) playAt(plIdx-1); });
nextBtn.addEventListener('click', ()=>{ if(plIdx<playlist.length-1) playAt(plIdx+1); });
plAdd.addEventListener('click', ()=>{
  const u=urlIn.value.trim();
  if(!u){ setStatus('⚠️ Load a URL first','err'); return; }
  const t=prompt('Name for playlist:', u.split('/').pop().replace(/\?.*/,'').substring(0,40))||u;
  playlist.push({u,t});
  plIdx=playlist.length-1;
  renderPlaylist();
  setStatus('Added: '+t,'ok');
});

// ===== KEYBOARD =====
document.addEventListener('keydown', e=>{
  if(['INPUT','TEXTAREA'].includes(e.target.tagName)) return;
  if(e.code==='Space'){ e.preventDefault(); togglePlay(); }
  if(e.code==='ArrowRight'){ V.currentTime+=5; }
  if(e.code==='ArrowLeft'){ V.currentTime-=5; }
  if(e.code==='ArrowUp'){ e.preventDefault(); V.volume=Math.min(1,V.volume+.1); volEl.value=V.volume; updateVolUI(); }
  if(e.code==='ArrowDown'){ e.preventDefault(); V.volume=Math.max(0,V.volume-.1); volEl.value=V.volume; updateVolUI(); }
  if(e.code==='KeyM'){ V.muted=!V.muted; updateVolUI(); }
  if(e.code==='KeyF') fsBtn.click();
  if(e.code==='KeyP') pipBtn.click();
});

renderPlaylist();
</script>
</body>
</html>
